# Codecov configuration for SayWhat.
# https://docs.codecov.com/docs/codecov-yaml  (QUALITY.md §6)

coverage:
  status:
    project:
      default:
        # The pure core (everything outside the coverage-ignored hardware/ML
        # adapters below) sits at ~97% line coverage, so hold a high bar and
        # don't regress. 1% drop tolerance absorbs measurement noise. The
        # remaining gaps are AVFoundation/CoreMedia failure-injection guards in
        # the durable writer that can't be triggered without brittle mocks.
        target: 95%
        threshold: 1%
    patch:
      default:
        # New/changed lines must be covered. This is the real gate. Adapter
        # diffs are excluded via `ignore`, so this lands on testable logic.
        target: 95%
        threshold: 0%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

# The hardware/AV adapter, SwiftUI previews, generated code, and tests aren't
# meaningfully unit-testable; the pure logic they wrap is. QUALITY.md §6.
ignore:
  - "Tests/**"
  - "**/*+Preview.swift"
  - "**/Preview Content/**"
  - "**/Capture/Adapters/**"      # AVAudioEngine / ScreenCaptureKit hardware adapters
  - "**/Transcription/Adapters/**" # SpeechAnalyzer / on-device ASR model adapters
  - "**/Diarization/Adapters/**"  # FluidAudio Sortformer / pyannote model adapters
  - "**/Summarization/Adapters/**" # Apple Foundation Models / MLX engine adapters
  - "**/*Adapter.swift"
  - "**/*.generated.swift"
