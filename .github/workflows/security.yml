name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly disclosed CVEs surface even without a push.
    - cron: "0 7 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # full history so the scan covers all commits

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan
        run: gitleaks git --redact --no-banner --report-format sarif --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Trivy is avoided (supply-chain-compromised twice in March 2026); we use
      # OSV-Scanner on the SwiftPM lockfile instead. QUALITY.md §7.
      - name: Scan Package.resolved
        run: |
          if [ ! -f Package.resolved ]; then
            echo "No Package.resolved yet (no third-party dependencies) — nothing to scan."
            exit 0
          fi
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          "$(go env GOPATH)/bin/osv-scanner" scan --lockfile=Package.resolved
