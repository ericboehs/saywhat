name: CodeQL

# CodeQL is slow (~13 min on Swift) and rarely changes verdict between a PR and
# its merge, so it runs on `main` (post-merge) and weekly — not as a PR gate.
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (swift)
    runs-on: macos-26
    permissions:
      contents: read
      security-events: write   # upload CodeQL results
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift

      # CodeQL Swift needs a real build — no `autobuild`. QUALITY.md §7.
      - name: Build
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
