name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned toolchain — no reliance on a single developer's local setup
  # (QUALITY.md §1 / §9).
  XCODE_VERSION: "26.5"

jobs:
  lint:
    name: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install linters
        run: brew install swiftformat swiftlint

      - name: swiftformat --lint
        run: swiftformat --lint --reporter github-actions-log .

      - name: swiftlint --strict
        run: swiftlint lint --strict --reporter github-actions-logging

  test:
    name: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & test (with coverage)
        run: |
          set -o pipefail
          swift test --enable-code-coverage 2>&1 | xcbeautify --renderer github-actions

      - name: Export lcov coverage
        run: |
          set -euo pipefail
          BIN=$(swift build --show-bin-path)
          XCTEST=$(find "$BIN" -name '*.xctest' -maxdepth 1 | head -1)
          PROFDATA="$BIN/codecov/default.profdata"
          TEST_BINARY="$XCTEST/Contents/MacOS/$(basename "$XCTEST" .xctest)"
          xcrun llvm-cov export \
            -format=lcov \
            -instr-profile "$PROFDATA" \
            "$TEST_BINARY" \
            --ignore-filename-regex='.build|Tests|\.derived' \
            > coverage.lcov
          echo "Wrote $(wc -l < coverage.lcov) lines of lcov"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.lcov
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  app:
    name: app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install xcbeautify
        run: brew install xcbeautify

      # The app target needs Xcode (Info.plist/entitlements/.app bundle) — SPM
      # alone can't build it. Unsigned build verifies it compiles & links the
      # SayWhatCore package; signing happens only in the release flow.
      - name: Build app (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project SayWhat.xcodeproj \
            -scheme SayWhat \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
